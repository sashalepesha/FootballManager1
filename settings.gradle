
pluginManagement {
    repositories {
        // jhipster-needle-gradle-plugin-management-repositories - JHipster will add additional entries here
    }
    buildscript {
        repositories {
            mavenCentral()
        }
        dependencies {
          def libVersion = settings.ext.has('liquibaseVersion') ? settings.ext.get('liquibaseVersion') : '5.0.1'

          classpath "org.liquibase:liquibase-core:${libVersion}"
        }
    }
    plugins {
        id "org.liquibase.gradle" version "${liquibasePluginVersion}"
        // jhipster-needle-gradle-plugin-management-plugins - JHipster will add additional entries here
    }
}

rootProject.name = "football-manager"
