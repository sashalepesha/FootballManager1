# This configuration is intended for development purpose, it's **your** responsibility to harden it for production
name: footballmanager
services:
  postgresql:
    image: postgres:18.3
    # volumes:
    #   - ~/volumes/jhipster/footballManager/postgresql/:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=footballManager
      - POSTGRES_DB=footballManager
      - POSTGRES_HOST_AUTH_METHOD=trust
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U footballManager -d footballManager" ]
      interval: 5s
      timeout: 5s
      retries: 10
    # If you want to expose these ports outside your dev PC,
    # remove the "127.0.0.1:" prefix
    ports:
      - 127.0.0.1:5432:5432
